services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travel}
      POSTGRES_USER: ${POSTGRES_USER:-travel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-travel}
    ports:
      - "15432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-travel} -d ${POSTGRES_DB:-travel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: travel-mvp
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-travel}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-travel}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-travel}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"

volumes:
  pg_data:
