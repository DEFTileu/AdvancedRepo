<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(#{admin.apartment.formTitle} + ' · ' + #{nav.brand}, ~{::content}, ~{::scripts})}">
<body>

<th:block th:fragment="content">
    <section class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <a th:href="@{/admin}" class="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-indigo-600 mb-4">
            ← <span th:text="#{admin.back}">Back to admin</span>
        </a>

        <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-6">
            <span th:if="${mode == 'new'}" th:text="#{admin.apartment.add}">Add apartment</span>
            <span th:unless="${mode == 'new'}" th:text="#{admin.apartment.editTitle}">Edit apartment</span>
        </h1>

        <form th:with="formAction=${mode == 'new' ? '/admin/apartments' : '/admin/apartments/' + apartment.id}"
              th:action="@{${formAction}}"
              method="post" enctype="multipart/form-data"
              class="bg-white rounded-2xl shadow-sm p-6 space-y-6">

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <label class="block sm:col-span-2">
                    <span class="text-sm font-medium text-slate-700" th:text="#{admin.apt.title}">Title</span>
                    <input type="text" name="title" required th:value="${apartment.title}"
                           class="mt-1 block w-full rounded-xl border-slate-200 bg-slate-50 px-3 py-2 focus:bg-white focus:border-indigo-500 focus:ring-indigo-500"/>
                </label>
                <label class="block sm:col-span-2">
                    <span class="text-sm font-medium text-slate-700" th:text="#{apt.address}">Address</span>
                    <input type="text" name="address" required th:value="${apartment.address}"
                           class="mt-1 block w-full rounded-xl border-slate-200 bg-slate-50 px-3 py-2 focus:bg-white focus:border-indigo-500 focus:ring-indigo-500"/>
                </label>
                <label class="block">
                    <span class="text-sm font-medium text-slate-700" th:text="#{admin.apt.pricePerNight}">Price per night, ₸</span>
                    <input type="number" name="pricePerNight" required min="500" step="500" th:value="${apartment.pricePerNight != 0 ? apartment.pricePerNight : 15000}"
                           class="mt-1 block w-full rounded-xl border-slate-200 bg-slate-50 px-3 py-2 focus:bg-white focus:border-indigo-500 focus:ring-indigo-500"/>
                </label>
                <label class="block">
                    <span class="text-sm font-medium text-slate-700" th:text="#{car.rating}">Rating</span>
                    <input type="number" name="rating" required min="0" max="5" step="0.1" th:value="${apartment.rating != 0 ? apartment.rating : 4.5}"
                           class="mt-1 block w-full rounded-xl border-slate-200 bg-slate-50 px-3 py-2 focus:bg-white focus:border-indigo-500 focus:ring-indigo-500"/>
                </label>
                <label class="block">
                    <span class="text-sm font-medium text-slate-700" th:text="#{apt.bedrooms}">Bedrooms</span>
                    <input type="number" name="bedrooms" required min="0" max="10" th:value="${apartment.bedrooms != 0 ? apartment.bedrooms : 1}"
                           class="mt-1 block w-full rounded-xl border-slate-200 bg-slate-50 px-3 py-2 focus:bg-white focus:border-indigo-500 focus:ring-indigo-500"/>
                </label>
                <label class="block">
                    <span class="text-sm font-medium text-slate-700" th:text="#{apt.guests}">Guests</span>
                    <input type="number" name="guests" required min="1" max="20" th:value="${apartment.guests != 0 ? apartment.guests : 2}"
                           class="mt-1 block w-full rounded-xl border-slate-200 bg-slate-50 px-3 py-2 focus:bg-white focus:border-indigo-500 focus:ring-indigo-500"/>
                </label>
                <label class="flex items-center gap-2 mt-6 sm:col-span-2">
                    <input type="checkbox" name="available" value="true" th:checked="${apartment.available}"
                           class="rounded text-indigo-600 focus:ring-indigo-500"/>
                    <span class="text-sm font-medium text-slate-700" th:text="#{admin.available}">Available for booking</span>
                </label>
            </div>

            <div>
                <span class="text-sm font-medium text-slate-700 block mb-2" th:text="#{admin.image}">Image</span>
                <img th:if="${apartment.id != null}" th:src="@{|/apartments/${apartment.id}/image|}" alt="" onerror="this.style.display='none'"
                     class="h-32 rounded-xl object-cover bg-slate-100 mb-3"/>
                <input type="file" name="image" accept="image/*"
                       class="block w-full text-sm text-slate-600 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-medium file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100"/>
                <p class="text-xs text-slate-400 mt-1" th:text="#{admin.image.hint}">Up to 5 MB. Stored as base64 in DB.</p>
            </div>

            <div>
                <span class="text-sm font-medium text-slate-700 block mb-2" th:text="#{admin.location}">Location</span>
                <p class="text-xs text-slate-500 mb-2" th:text="#{admin.location.hint}">Click on the map to drop a pin where the apartment is located.</p>
                <div id="map" style="height: 320px;" class="rounded-xl shadow-sm overflow-hidden"></div>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <label class="block">
                        <span class="text-xs text-slate-500">Latitude</span>
                        <input type="number" id="lat" name="latitude" step="any" required readonly
                               th:value="${apartment.latitude != 0 ? apartment.latitude : ''}"
                               class="mt-0.5 block w-full rounded-xl border-slate-200 bg-slate-50 px-3 py-2 text-sm font-mono"/>
                    </label>
                    <label class="block">
                        <span class="text-xs text-slate-500">Longitude</span>
                        <input type="number" id="lng" name="longitude" step="any" required readonly
                               th:value="${apartment.longitude != 0 ? apartment.longitude : ''}"
                               class="mt-0.5 block w-full rounded-xl border-slate-200 bg-slate-50 px-3 py-2 text-sm font-mono"/>
                    </label>
                </div>
            </div>

            <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
                <a th:href="@{/admin}" class="px-5 py-2.5 rounded-xl text-slate-600 hover:bg-slate-100 transition"
                   th:text="#{button.cancel}">Cancel</a>
                <button type="submit"
                        class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-emerald-600 text-white font-medium hover:bg-emerald-700 transition shadow-sm"
                        th:text="#{admin.save}">Save</button>
            </div>
        </form>
    </section>
</th:block>

<th:block th:fragment="scripts">
    <script th:inline="javascript">
        (function () {
            const cityLat = 43.2389;
            const cityLng = 76.8897;
            const cityZoom = 12;
            const initLat = parseFloat(document.getElementById('lat').value) || cityLat;
            const initLng = parseFloat(document.getElementById('lng').value) || cityLng;
            const hasInitial = !!document.getElementById('lat').value;

            const map = L.map('map').setView([initLat, initLng], hasInitial ? 14 : cityZoom);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19, attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            const aptIcon = L.divIcon({
                className: 'leaflet-emoji-icon',
                html: '<div style="font-size:28px;">🏠</div>',
                iconSize: [32, 32], iconAnchor: [16, 16]
            });

            let marker = hasInitial ? L.marker([initLat, initLng], {icon: aptIcon}).addTo(map) : null;

            map.on('click', (e) => {
                const {lat, lng} = e.latlng;
                document.getElementById('lat').value = lat.toFixed(6);
                document.getElementById('lng').value = lng.toFixed(6);
                if (marker) marker.setLatLng(e.latlng);
                else marker = L.marker(e.latlng, {icon: aptIcon}).addTo(map);
            });
        })();
    </script>
</th:block>

</body>
</html>
