<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(#{admin.dashboard.title} + ' · ' + #{nav.brand}, ~{::content}, ~{})}">
<body>

<th:block th:fragment="content">
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex items-center justify-between flex-wrap gap-3 mb-6">
            <h1 class="text-2xl sm:text-3xl font-bold text-slate-900" th:text="#{admin.dashboard.title}">Admin dashboard</h1>
            <div class="flex gap-2">
                <a th:href="@{/admin/cars/new}"
                   class="inline-flex items-center justify-center px-4 py-2 rounded-xl bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 transition shadow-sm"
                   th:text="#{admin.car.add}">Add car</a>
                <a th:href="@{/admin/apartments/new}"
                   class="inline-flex items-center justify-center px-4 py-2 rounded-xl bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-700 transition shadow-sm"
                   th:text="#{admin.apartment.add}">Add apartment</a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                    <h2 class="font-semibold text-slate-900">
                        <span th:text="#{admin.cars}">Cars</span>
                        <span class="text-slate-400 text-sm ml-1" th:text="${'(' + cars.size() + ')'}">(0)</span>
                    </h2>
                </div>
                <div th:if="${cars.empty}" class="px-6 py-10 text-center text-slate-500"
                     th:text="#{admin.cars.empty}">No cars yet — add your first one.</div>
                <ul th:unless="${cars.empty}" class="divide-y divide-slate-100">
                    <li th:each="c : ${cars}" class="px-6 py-3 flex items-center gap-3">
                        <img th:src="@{|/cars/${c.id}/image|}" alt="" loading="lazy" onerror="this.style.display='none'"
                             class="w-12 h-12 rounded-lg object-cover bg-gradient-to-br from-indigo-100 to-emerald-100"/>
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold text-slate-900 truncate">
                                <span th:text="${c.brand}">Toyota</span>
                                <span th:text="${c.model}">Camry</span>
                                <span class="text-slate-400 text-xs ml-1" th:text="${c.year}">2022</span>
                            </div>
                            <div class="text-xs text-slate-500"
                                 th:text="#{car.price.hour(${#numbers.formatInteger(c.pricePerHour, 1, 'COMMA')})}">3,000 ₸ / hour</div>
                        </div>
                        <span th:if="${c.available}" class="px-2 py-0.5 rounded-full text-xs bg-emerald-50 text-emerald-700"
                              th:text="#{car.available}">Available</span>
                        <span th:unless="${c.available}" class="px-2 py-0.5 rounded-full text-xs bg-rose-50 text-rose-700"
                              th:text="#{car.unavailable}">Unavailable</span>
                        <a th:href="@{|/admin/cars/${c.id}/edit|}"
                           class="text-indigo-600 hover:text-indigo-700 text-sm font-medium"
                           th:text="#{admin.edit}">Edit</a>
                        <form th:action="@{|/admin/cars/${c.id}/delete|}" method="post" class="inline"
                              onsubmit="return confirm('Delete this car?')">
                            <button type="submit" class="text-rose-600 hover:text-rose-700 text-sm font-medium"
                                    th:text="#{admin.delete}">Delete</button>
                        </form>
                    </li>
                </ul>
            </div>

            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                    <h2 class="font-semibold text-slate-900">
                        <span th:text="#{admin.apartments}">Apartments</span>
                        <span class="text-slate-400 text-sm ml-1" th:text="${'(' + apartments.size() + ')'}">(0)</span>
                    </h2>
                </div>
                <div th:if="${apartments.empty}" class="px-6 py-10 text-center text-slate-500"
                     th:text="#{admin.apartments.empty}">No apartments yet — add your first one.</div>
                <ul th:unless="${apartments.empty}" class="divide-y divide-slate-100">
                    <li th:each="a : ${apartments}" class="px-6 py-3 flex items-center gap-3">
                        <img th:src="@{|/apartments/${a.id}/image|}" alt="" loading="lazy" onerror="this.style.display='none'"
                             class="w-12 h-12 rounded-lg object-cover bg-gradient-to-br from-indigo-100 to-emerald-100"/>
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold text-slate-900 truncate" th:text="${a.title}">Cozy studio</div>
                            <div class="text-xs text-slate-500"
                                 th:text="#{apt.price.night(${#numbers.formatInteger(a.pricePerNight, 1, 'COMMA')})}">15,000 ₸ / night</div>
                        </div>
                        <span th:if="${a.available}" class="px-2 py-0.5 rounded-full text-xs bg-emerald-50 text-emerald-700"
                              th:text="#{car.available}">Available</span>
                        <span th:unless="${a.available}" class="px-2 py-0.5 rounded-full text-xs bg-rose-50 text-rose-700"
                              th:text="#{car.unavailable}">Unavailable</span>
                        <a th:href="@{|/admin/apartments/${a.id}/edit|}"
                           class="text-indigo-600 hover:text-indigo-700 text-sm font-medium"
                           th:text="#{admin.edit}">Edit</a>
                        <form th:action="@{|/admin/apartments/${a.id}/delete|}" method="post" class="inline"
                              onsubmit="return confirm('Delete this apartment?')">
                            <button type="submit" class="text-rose-600 hover:text-rose-700 text-sm font-medium"
                                    th:text="#{admin.delete}">Delete</button>
                        </form>
                    </li>
                </ul>
            </div>

        </div>
    </section>
</th:block>

</body>
</html>
