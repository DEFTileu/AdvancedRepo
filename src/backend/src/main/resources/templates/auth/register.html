<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(#{auth.register.title} + ' · ' + #{nav.brand}, ~{::content}, ~{})}">
<body>

<th:block th:fragment="content">
    <section class="max-w-md mx-auto px-4 sm:px-6 pt-12">
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="bg-gradient-to-br from-indigo-600 to-emerald-500 text-white px-8 py-6">
                <h1 class="text-2xl font-bold" th:text="#{auth.register.title}">Create an account</h1>
                <p class="text-sm opacity-80 mt-1" th:text="#{auth.register.subtitle}">Start booking trips in seconds.</p>
            </div>

            <div class="p-8">
                <div th:if="${registerError != null}"
                     class="mb-4 px-4 py-3 rounded-xl bg-rose-50 text-rose-700 text-sm border border-rose-200"
                     th:text="${registerError}">Username already taken.</div>

                <form th:action="@{/register}" method="post" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1"
                               th:text="#{auth.username}">Username</label>
                        <input type="text" name="username" required autofocus autocomplete="username"
                               minlength="3" maxlength="32"
                               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1"
                               th:text="#{auth.displayName}">Display name</label>
                        <input type="text" name="displayName" autocomplete="name"
                               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1"
                               th:text="#{auth.password}">Password</label>
                        <input type="password" name="password" required autocomplete="new-password"
                               minlength="6" maxlength="100"
                               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"/>
                    </div>
                    <button type="submit"
                            class="w-full inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 transition shadow-sm"
                            th:text="#{auth.register.cta}">Create account</button>
                </form>

                <p class="text-sm text-slate-500 mt-6 text-center">
                    <span th:text="#{auth.register.haveAccount}">Already have an account?</span>
                    <a th:href="@{/login}" class="text-indigo-600 hover:text-indigo-700 font-medium ml-1"
                       th:text="#{auth.login.cta}">Sign in</a>
                </p>
            </div>
        </div>
    </section>
</th:block>

</body>
</html>
