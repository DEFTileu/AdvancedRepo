<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(#{booking.confirmed.title}, ~{::content}, ~{})}">
<body>

<th:block th:fragment="content">
    <section class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="bg-gradient-to-br from-emerald-500 to-emerald-600 text-white p-8 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/20 backdrop-blur mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
                         class="w-9 h-9 text-white">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold" th:text="#{booking.confirmed.title}">Booking confirmed!</h1>
                <p class="mt-2 opacity-90"
                   th:text="#{booking.confirmed.message(${car != null ? '' : (apartment != null ? '' : '')})}">Your trip is locked in.</p>
            </div>

            <div class="p-6 sm:p-8 flex flex-col gap-5">
                <div class="flex items-center justify-between">
                    <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium"
                          th:classappend="${booking.type.name() == 'CAR'} ? 'bg-indigo-50 text-indigo-700' : (${booking.type.name() == 'APARTMENT'} ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700')">
                        <span th:if="${booking.type.name() == 'CAR'}" th:text="#{booking.type.car}">Car</span>
                        <span th:if="${booking.type.name() == 'APARTMENT'}" th:text="#{booking.type.apartment}">Stay</span>
                        <span th:if="${booking.type.name() == 'COMBO'}" th:text="#{booking.type.combo}">Combo</span>
                    </span>
                    <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700"
                          th:text="#{booking.status.confirmed}">Confirmed</span>
                </div>

                <div th:if="${car != null}" class="flex items-center gap-4 bg-slate-50 rounded-xl p-4">
                    <img th:src="${car.imageUrl}" alt="" class="w-20 h-20 object-cover rounded-lg bg-slate-100"/>
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-slate-900 truncate">
                            <span th:text="${car.brand}">Toyota</span>
                            <span th:text="${car.model}">Camry</span>
                        </div>
                        <div class="text-sm text-slate-500">
                            <span th:text="${booking.hours}">4</span>
                            <span th:text="#{car.book.hours}">Hours</span>
                        </div>
                    </div>
                </div>

                <div th:if="${apartment != null}" class="flex items-center gap-4 bg-slate-50 rounded-xl p-4">
                    <img th:src="${apartment.imageUrl}" alt="" class="w-20 h-20 object-cover rounded-lg bg-slate-100"/>
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-slate-900 truncate" th:text="${apartment.title}">Cozy flat</div>
                        <div class="text-sm text-slate-500">
                            <span th:text="${booking.nights}">2</span>
                            <span th:text="#{apt.book.nights}">Nights</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-2">
                    <div>
                        <div class="text-xs text-slate-500" th:text="#{booking.created}">Booked at</div>
                        <div class="font-medium text-slate-900"
                             th:text="${#temporals.format(booking.createdAt, 'dd MMM yyyy HH:mm')}">27 Apr 2026 10:00</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-slate-500" th:text="#{booking.total}">Total</div>
                        <div class="text-2xl font-bold text-slate-900">
                            <span th:text="${#numbers.formatInteger(booking.totalPrice, 1, 'COMMA')}">42,000</span> ₸
                        </div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 pt-4">
                    <a th:href="@{/}"
                       class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 transition shadow-sm w-full sm:w-auto"
                       th:text="#{booking.back}">Back to map</a>
                    <a th:href="@{/bookings}"
                       class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-white text-indigo-600 ring-1 ring-indigo-200 hover:bg-indigo-50 font-medium transition w-full sm:w-auto"
                       th:text="#{booking.list.title}">My bookings</a>
                </div>
            </div>
        </div>
    </section>
</th:block>

</body>
</html>
