<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(#{car.detail.title}, ~{::content}, ~{})}">
<body>

<th:block th:fragment="content">
    <section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <a th:href="@{/cars}" class="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-indigo-600 mb-4">
            ← <span th:text="#{button.back}">Back</span>
        </a>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-5">
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                    <img th:src="@{|/cars/${car.id}/image|}" alt="" loading="lazy"
                         onerror="this.style.display='none'"
                         class="w-full h-72 sm:h-96 object-cover bg-gradient-to-br from-indigo-100 to-emerald-100"/>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <div class="flex items-start justify-between gap-4 flex-wrap">
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-bold text-slate-900">
                                <span th:text="${car.brand}">Toyota</span>
                                <span th:text="${car.model}">Camry</span>
                            </h1>
                            <div class="text-sm text-slate-500 mt-1">
                                <span th:text="#{car.year}">Year</span>:
                                <span th:text="${car.year}">2022</span>
                            </div>
                        </div>
                        <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700">
                            ★ <span th:text="${car.rating}">4.8</span>
                        </span>
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-6">
                        <div class="bg-slate-50 rounded-xl p-3">
                            <div class="text-xs text-slate-500" th:text="#{car.fuel}">Fuel</div>
                            <div class="font-semibold text-slate-900" th:text="${car.fuelType}">Petrol</div>
                        </div>
                        <div class="bg-slate-50 rounded-xl p-3">
                            <div class="text-xs text-slate-500" th:text="#{car.seats}">Seats</div>
                            <div class="font-semibold text-slate-900" th:text="${car.seats}">4</div>
                        </div>
                        <div class="bg-slate-50 rounded-xl p-3">
                            <div class="text-xs text-slate-500" th:text="#{car.year}">Year</div>
                            <div class="font-semibold text-slate-900" th:text="${car.year}">2022</div>
                        </div>
                        <div class="bg-slate-50 rounded-xl p-3">
                            <div class="text-xs text-slate-500" th:text="#{car.rating}">Rating</div>
                            <div class="font-semibold text-slate-900">★ <span th:text="${car.rating}">4.8</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <aside class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-sm p-6 lg:sticky lg:top-24">
                    <div class="flex items-baseline justify-between mb-4">
                        <span class="text-2xl font-bold text-slate-900"
                              th:text="#{car.price.hour(${#numbers.formatInteger(car.pricePerHour, 1, 'COMMA')})}">3,000 ₸ / hour</span>
                        <span th:if="${car.available}"
                              class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700"
                              th:text="#{car.available}">Available</span>
                        <span th:unless="${car.available}"
                              class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-rose-50 text-rose-700"
                              th:text="#{car.unavailable}">Unavailable</span>
                    </div>

                    <form th:if="${currentUser != null}" th:action="@{|/cars/${car.id}/book|}" method="post" class="flex flex-col gap-4">
                        <label class="block">
                            <span class="text-sm font-medium text-slate-700" th:text="#{car.book.hours}">Hours</span>
                            <input type="number" name="hours" min="1" max="168" value="4"
                                   class="mt-1 block w-full rounded-xl border-slate-200 bg-slate-50 px-3 py-2 text-slate-900 focus:bg-white focus:border-indigo-500 focus:ring-indigo-500"/>
                        </label>
                        <button type="submit"
                                th:disabled="${!car.available}"
                                class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 transition shadow-sm disabled:bg-slate-300 disabled:cursor-not-allowed"
                                th:text="#{car.book.confirm}">Confirm booking</button>
                    </form>

                    <a th:if="${currentUser == null}" th:href="@{/login}"
                       class="inline-flex items-center justify-center w-full px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 transition shadow-sm"
                       th:text="#{auth.signInToBook}">Sign in to book this</a>
                </div>
            </aside>
        </div>
    </section>
</th:block>

</body>
</html>
