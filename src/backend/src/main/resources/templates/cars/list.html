<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(#{cars.title}, ~{::content}, ~{})}">
<body>

<th:block th:fragment="content">
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-6" th:text="#{cars.title}">Cars near you</h1>

        <div th:if="${#lists.isEmpty(cars)}"
             class="bg-white rounded-2xl shadow-sm p-10 text-center text-slate-500"
             th:text="#{cars.empty}">No cars available right now.</div>

        <div th:unless="${#lists.isEmpty(cars)}"
             class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            <a th:each="car : ${cars}" th:href="@{|/cars/${car.id}|}"
               class="bg-white rounded-2xl shadow-sm hover:shadow-lg transition overflow-hidden flex flex-col">
                <div class="relative">
                    <img th:src="@{|/cars/${car.id}/image|}" alt="" loading="lazy"
                         onerror="this.style.display='none'"
                         class="h-44 w-full object-cover rounded-t-2xl bg-gradient-to-br from-indigo-100 to-emerald-100"/>
                    <span class="absolute top-3 left-3 inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700">
                        ★ <span th:text="${car.rating}">4.8</span>
                    </span>
                    <span th:if="${!car.available}"
                          class="absolute top-3 right-3 inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-rose-50 text-rose-700"
                          th:text="#{car.unavailable}">Unavailable</span>
                </div>
                <div class="p-5 flex flex-col gap-2 flex-1">
                    <div class="flex items-baseline justify-between gap-2">
                        <h2 class="font-semibold text-slate-900 text-lg">
                            <span th:text="${car.brand}">Toyota</span>
                            <span th:text="${car.model}">Camry</span>
                        </h2>
                        <span class="text-xs text-slate-400" th:text="${car.year}">2022</span>
                    </div>
                    <div class="flex items-center gap-3 text-sm text-slate-500">
                        <span th:text="${car.fuelType}">Petrol</span>
                        <span class="w-1 h-1 rounded-full bg-slate-300"></span>
                        <span><span th:text="${car.seats}">4</span> <span th:text="#{car.seats}">Seats</span></span>
                    </div>
                    <div class="mt-auto pt-3 flex items-center justify-between">
                        <span class="text-base font-semibold text-slate-900"
                              th:text="#{car.price.hour(${#numbers.formatInteger(car.pricePerHour, 1, 'COMMA')})}">3,000 ₸ / hour</span>
                        <span class="inline-flex items-center justify-center px-4 py-2 rounded-xl bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 transition shadow-sm"
                              th:text="#{car.book}">Book this car</span>
                    </div>
                </div>
            </a>
        </div>
    </section>
</th:block>

</body>
</html>
