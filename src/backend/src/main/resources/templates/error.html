<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(#{error.title} + ' · ' + #{nav.brand}, ~{::content}, ~{})}">
<body>

<th:block th:fragment="content">
    <section class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 pt-12">
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="bg-gradient-to-br from-rose-500 to-amber-500 text-white px-8 py-6">
                <div class="text-sm uppercase tracking-wider opacity-80" th:text="${status} ?: 'Error'">500</div>
                <h1 class="text-2xl sm:text-3xl font-bold mt-1" th:text="#{error.title}">Something went wrong</h1>
            </div>
            <div class="p-8">
                <p class="text-slate-600 mb-2" th:text="#{error.subtitle}">
                    We couldn't complete that request. Try a different option or head back to the map.
                </p>
                <p class="text-sm text-slate-400 font-mono break-words"
                   th:if="${message != null and !message.isEmpty()}"
                   th:text="${message}">Detail message</p>

                <div class="flex flex-wrap items-center gap-3 mt-6">
                    <a th:href="@{/}"
                       class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 transition shadow-sm"
                       th:text="#{booking.back}">Back to map</a>
                    <a th:href="@{/bookings}"
                       class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-white text-indigo-600 ring-1 ring-indigo-200 hover:bg-indigo-50 transition"
                       th:text="#{nav.bookings}">My bookings</a>
                </div>
            </div>
        </div>
    </section>
</th:block>

</body>
</html>
