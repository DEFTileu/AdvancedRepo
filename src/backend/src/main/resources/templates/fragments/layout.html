<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="page(title, content, scripts)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}">Travel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .leaflet-emoji-icon { font-size: 28px; line-height: 28px; text-align: center; filter: drop-shadow(0 1px 2px rgba(0,0,0,.25)); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

<nav class="sticky top-0 z-40 bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-wrap items-center justify-between gap-3 py-3">
            <a href="/" th:href="@{/}" class="flex items-center gap-2 shrink-0">
                <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-indigo-600 text-white font-bold">T</span>
                <span class="text-lg font-semibold text-slate-900" th:text="#{nav.brand}">Travel</span>
            </a>

            <div class="order-3 md:order-2 w-full md:w-auto flex items-center gap-1 sm:gap-2 md:gap-4 text-sm font-medium overflow-x-auto">
                <a th:href="@{/}" class="px-2 py-1 text-slate-600 hover:text-indigo-600 transition" th:text="#{nav.map}">Map</a>
                <a th:href="@{/cars}" class="px-2 py-1 text-slate-600 hover:text-indigo-600 transition" th:text="#{nav.cars}">Cars</a>
                <a th:href="@{/apartments}" class="px-2 py-1 text-slate-600 hover:text-indigo-600 transition" th:text="#{nav.apartments}">Stays</a>
                <a th:href="@{/combo}" class="px-2 py-1 text-slate-600 hover:text-indigo-600 transition" th:text="#{nav.combo}">Combo</a>
                <a th:if="${currentUser != null}" th:href="@{/bookings}" class="px-2 py-1 text-slate-600 hover:text-indigo-600 transition" th:text="#{nav.bookings}">My bookings</a>
                <a th:if="${currentUser != null and currentUser.role.name() == 'ADMIN'}"
                   th:href="@{/admin}"
                   class="px-2 py-1 text-rose-600 hover:text-rose-700 font-semibold transition"
                   th:text="#{nav.admin}">Admin</a>
            </div>

            <div class="order-2 md:order-3 flex items-center gap-2">
                <div class="flex items-center gap-1">
                    <a th:href="@{/lang/en}"
                       th:classappend="${#locale.language == 'en'} ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:text-slate-900'"
                       class="px-2.5 py-1 rounded-full text-xs font-semibold transition">EN</a>
                    <a th:href="@{/lang/ru}"
                       th:classappend="${#locale.language == 'ru'} ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:text-slate-900'"
                       class="px-2.5 py-1 rounded-full text-xs font-semibold transition">RU</a>
                    <a th:href="@{/lang/kk}"
                       th:classappend="${#locale.language == 'kk'} ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:text-slate-900'"
                       class="px-2.5 py-1 rounded-full text-xs font-semibold transition">KZ</a>
                </div>

                <div class="flex items-center gap-2 pl-2 ml-1 border-l border-slate-200">
                    <th:block th:if="${currentUser == null}">
                        <a th:href="@{/login}"
                           class="px-3 py-1.5 rounded-xl text-sm font-medium text-slate-600 hover:text-indigo-600 transition"
                           th:text="#{auth.login.cta}">Sign in</a>
                        <a th:href="@{/register}"
                           class="px-3 py-1.5 rounded-xl text-sm font-medium bg-indigo-600 text-white hover:bg-indigo-700 transition shadow-sm"
                           th:text="#{auth.register.cta}">Sign up</a>
                    </th:block>
                    <th:block th:if="${currentUser != null}">
                        <span class="hidden sm:inline text-sm text-slate-600">
                            <span th:text="#{auth.greeting}">Hi,</span>
                            <span class="font-semibold text-slate-900" th:text="${currentUser.displayName}">Guest</span>
                        </span>
                        <form th:action="@{/logout}" method="post" class="inline">
                            <button type="submit"
                                    class="px-3 py-1.5 rounded-xl text-sm font-medium text-slate-600 hover:text-rose-600 transition"
                                    th:text="#{auth.logout.cta}">Log out</button>
                        </form>
                    </th:block>
                </div>
            </div>
        </div>
    </div>
</nav>

<main th:replace="${content}">
    <div>page content</div>
</main>

<footer class="mt-12 py-8 text-center text-xs text-slate-400">
    <span th:text="#{nav.brand}">Travel</span> &middot; MVP
</footer>

<th:block th:replace="${scripts} ?: ~{}"></th:block>

</body>
</html>
