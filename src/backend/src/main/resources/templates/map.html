<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(#{nav.map} + ' · ' + #{nav.brand}, ~{::content}, ~{::scripts})}">
<body>

<th:block th:fragment="content">
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6">
        <div class="flex flex-col gap-2 mb-4">
            <h1 class="text-2xl sm:text-3xl font-bold text-slate-900"
                th:text="#{map.title(${city.name})}">Find your trip</h1>
            <p class="text-slate-500" th:text="#{map.subtitle}">Pick a car, book a place, hit the road.</p>
        </div>

        <div class="flex items-center gap-2 mb-4" id="filterPills">
            <button type="button" data-filter="both"
                    class="filter-pill px-4 py-2 rounded-full text-sm font-medium bg-indigo-600 text-white shadow-sm transition"
                    th:text="#{map.toggle.both}">Both</button>
            <button type="button" data-filter="cars"
                    class="filter-pill px-4 py-2 rounded-full text-sm font-medium bg-white text-slate-600 ring-1 ring-slate-200 hover:bg-slate-100 transition"
                    th:text="#{map.toggle.cars}">Cars</button>
            <button type="button" data-filter="apartments"
                    class="filter-pill px-4 py-2 rounded-full text-sm font-medium bg-white text-slate-600 ring-1 ring-slate-200 hover:bg-slate-100 transition"
                    th:text="#{map.toggle.apartments}">Stays</button>
        </div>

        <div class="relative">
            <div id="map" class="w-full rounded-2xl shadow-sm overflow-hidden"
                 style="height: calc(100vh - 320px); min-height: 360px;"></div>

            <div id="mapLoading"
                 class="absolute inset-0 flex items-center justify-center bg-white/70 backdrop-blur rounded-2xl pointer-events-none transition-opacity">
                <div class="flex items-center gap-3 px-4 py-2 rounded-full bg-white shadow-md text-sm text-slate-600">
                    <span class="inline-block w-3 h-3 rounded-full bg-indigo-600 animate-pulse"></span>
                    <span th:text="#{map.loading}">Loading map…</span>
                </div>
            </div>

            <div id="mapCounter"
                 class="absolute top-4 right-4 hidden flex-col gap-1 px-3 py-2 rounded-xl bg-white/95 shadow-md text-xs font-medium text-slate-700">
                <div><span>🚗</span>&nbsp;<span id="carCount">0</span></div>
                <div><span>🏠</span>&nbsp;<span id="aptCount">0</span></div>
            </div>

            <div id="mapToast"
                 class="absolute bottom-4 left-1/2 -translate-x-1/2 hidden px-4 py-2 rounded-full bg-rose-600 text-white text-sm shadow-lg"
                 th:text="#{map.fetchFailed}">Couldn't load some markers.</div>
        </div>

        <div th:if="${recommendation != null}" class="mt-6">
            <a th:href="@{/combo}"
               class="block bg-white rounded-2xl shadow-sm hover:shadow-lg transition overflow-hidden">
                <div class="flex flex-col sm:flex-row items-stretch">
                    <div class="bg-gradient-to-br from-indigo-600 to-emerald-500 text-white px-6 py-5 sm:w-56 flex flex-col justify-center">
                        <span class="text-xs uppercase tracking-wider opacity-80"
                              th:text="#{combo.suggested}">Suggested for you</span>
                        <span class="text-lg font-semibold mt-1"
                              th:text="#{map.banner.combo.title}">Best combo for you</span>
                    </div>
                    <div class="flex-1 px-6 py-5 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                        <div class="flex flex-col gap-1">
                            <span class="text-sm text-slate-500">
                                <span th:text="${recommendation.car.brand}">Toyota</span>
                                <span th:text="${recommendation.car.model}">Camry</span>
                                &nbsp;+&nbsp;
                                <span th:text="${recommendation.apartment.title}">Cozy flat</span>
                            </span>
                            <span class="text-2xl font-bold text-slate-900">
                                <span th:text="${#numbers.formatInteger(recommendation.totalPrice, 1, 'COMMA')}">42,000</span> ₸
                            </span>
                        </div>
                        <span class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 transition shadow-sm"
                              th:text="#{map.banner.combo.cta}">See details</span>
                    </div>
                </div>
            </a>
        </div>
    </section>
</th:block>

<th:block th:fragment="scripts">
    <script th:inline="javascript">
        (function () {
            const cityLat = /*[[${city.latitude}]]*/ 43.238949;
            const cityLng = /*[[${city.longitude}]]*/ 76.889709;
            const cityZoom = /*[[${city.zoom}]]*/ 12;
            const i18n = {
                viewCar: /*[[#{map.popup.viewCar}]]*/ 'View car',
                viewApt: /*[[#{map.popup.viewApt}]]*/ 'View apartment',
                perHour: /*[[#{car.price.hour('')}]]*/ ' ₸ / hour',
                perNight: /*[[#{apt.price.night('')}]]*/ ' ₸ / night'
            };

            const map = L.map('map').setView([cityLat, cityLng], cityZoom);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            const carsLayer = L.layerGroup();
            const aptsLayer = L.layerGroup();

            const carIcon = L.divIcon({
                className: 'leaflet-emoji-icon',
                html: '<div style="font-size:28px;">🚗</div>',
                iconSize: [32, 32],
                iconAnchor: [16, 16]
            });
            const aptIcon = L.divIcon({
                className: 'leaflet-emoji-icon',
                html: '<div style="font-size:28px;">🏠</div>',
                iconSize: [32, 32],
                iconAnchor: [16, 16]
            });

            function fmt(n) {
                return new Intl.NumberFormat('en-US').format(n);
            }

            const loadingEl = document.getElementById('mapLoading');
            const counterEl = document.getElementById('mapCounter');
            const toastEl = document.getElementById('mapToast');
            const carCountEl = document.getElementById('carCount');
            const aptCountEl = document.getElementById('aptCount');
            let hadError = false;

            function fetchJson(url) {
                return fetch(url).then(r => {
                    if (!r.ok) throw new Error('http ' + r.status);
                    return r.json();
                });
            }

            const carsP = fetchJson('/api/markers/cars').then(data => {
                data.forEach(c => {
                    const marker = L.marker([c.lat, c.lng], {icon: carIcon});
                    const popup = `
                        <div style="min-width:160px">
                            <div style="font-weight:600;color:#0f172a">${c.brand} ${c.model}</div>
                            <div style="color:#475569;font-size:13px;margin:4px 0">
                                ${fmt(c.pricePerHour)} ${i18n.perHour}
                            </div>
                            <div style="color:#059669;font-size:12px;margin-bottom:6px">★ ${c.rating}</div>
                            <a href="/cars/${c.id}" style="color:#4f46e5;font-weight:500;text-decoration:none">${i18n.viewCar} →</a>
                        </div>`;
                    marker.bindPopup(popup);
                    marker.addTo(carsLayer);
                });
                carsLayer.addTo(map);
                carCountEl.textContent = data.length;
            }).catch(() => { hadError = true; });

            const aptsP = fetchJson('/api/markers/apartments').then(data => {
                data.forEach(a => {
                    const marker = L.marker([a.lat, a.lng], {icon: aptIcon});
                    const popup = `
                        <div style="min-width:160px">
                            <div style="font-weight:600;color:#0f172a">${a.title}</div>
                            <div style="color:#475569;font-size:13px;margin:4px 0">
                                ${fmt(a.pricePerNight)} ${i18n.perNight}
                            </div>
                            <div style="color:#059669;font-size:12px;margin-bottom:6px">★ ${a.rating}</div>
                            <a href="/apartments/${a.id}" style="color:#4f46e5;font-weight:500;text-decoration:none">${i18n.viewApt} →</a>
                        </div>`;
                    marker.bindPopup(popup);
                    marker.addTo(aptsLayer);
                });
                aptsLayer.addTo(map);
                aptCountEl.textContent = data.length;
            }).catch(() => { hadError = true; });

            Promise.allSettled([carsP, aptsP]).then(() => {
                loadingEl.style.opacity = '0';
                setTimeout(() => loadingEl.remove(), 300);
                counterEl.classList.remove('hidden');
                counterEl.classList.add('flex');
                if (hadError) {
                    toastEl.classList.remove('hidden');
                    setTimeout(() => toastEl.classList.add('hidden'), 5000);
                }
            });

            const pills = document.querySelectorAll('.filter-pill');
            pills.forEach(p => {
                p.addEventListener('click', () => {
                    pills.forEach(x => {
                        x.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
                        x.classList.add('bg-white', 'text-slate-600', 'ring-1', 'ring-slate-200', 'hover:bg-slate-100');
                    });
                    p.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');
                    p.classList.remove('bg-white', 'text-slate-600', 'ring-1', 'ring-slate-200', 'hover:bg-slate-100');

                    const f = p.dataset.filter;
                    if (f === 'both') {
                        if (!map.hasLayer(carsLayer)) carsLayer.addTo(map);
                        if (!map.hasLayer(aptsLayer)) aptsLayer.addTo(map);
                    } else if (f === 'cars') {
                        if (!map.hasLayer(carsLayer)) carsLayer.addTo(map);
                        if (map.hasLayer(aptsLayer)) map.removeLayer(aptsLayer);
                    } else if (f === 'apartments') {
                        if (map.hasLayer(carsLayer)) map.removeLayer(carsLayer);
                        if (!map.hasLayer(aptsLayer)) aptsLayer.addTo(map);
                    }
                });
            });
        })();
    </script>
</th:block>

</body>
</html>
